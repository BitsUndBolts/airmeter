<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirMeter · Meters</title>
  <link rel="stylesheet" href="airmeter.css">
  <style>
    .card-header { justify-content: space-between; }

    /* ── EMPTY STATE OVERRIDE (taller padding for this page) ── */
    .empty-state { padding: 3em 2em; }

    /* ── METER THUMB SIZE ── */
    .meter-block .meter-thumb          { width: 3.2em; height: 3.2em; }
    .meter-block .meter-thumb-fallback { font-size: 1em; }

    /* ── SPINNER OVERRIDE (smaller on this page) ── */
    .spinner-inline {
      width: 1.2em;
      height: 1.2em;
      border-width: 0.18em;
      margin-right: 0.4em;
    }

    /* ── METER BLOCKS ── */
    .meter-blocks {
      padding: 0 1.2em 1.2em;
      display: flex;
      flex-direction: column;
      gap: 1.2em;
    }

    .meter-block {
      background: var(--panel-2);
      border: 1px solid var(--border-bright);
      border-radius: 0.5em;
      overflow: hidden;
    }

    .meter-block-header {
      display: flex;
      align-items: center;
      gap: 1.2em;
      padding: 1.2em 1.4em;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }

    .meter-block-title { flex: 1; min-width: 0; }
    .meter-block-name  { font-size: 1.3em; font-weight: 600; color: var(--text); }

    .meter-block-sub {
      font-family: var(--mono);
      font-size: 0.95em;
      color: var(--text-3);
      letter-spacing: 0.06em;
      margin-top: 0.2em;
    }

    .meter-active-badge {
      font-family: var(--mono);
      font-size: 0.85em;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.25em 0.7em;
      border-radius: 0.25em;
      flex-shrink: 0;
    }

    .meter-active-badge.active   { color: var(--green);  background: var(--green-dim); border: 1px solid rgba(61,220,132,0.2); }
    .meter-active-badge.inactive { color: var(--text-3); background: rgba(74,81,88,0.2); border: 1px solid var(--border); }

    .meter-active-badge .dot {
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── FIELDS ── */
    .meter-fields { padding: 1.2em 1.4em; display: flex; flex-direction: column; gap: 1em; }

    .field-row   { display: flex; align-items: center; gap: 1em; }

    .field-label {
      font-family: var(--mono);
      font-size: 1em;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      width: 5.5em;
      flex-shrink: 0;
    }

    .field-input {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 0.3em;
      padding: 0.6em 0.9em;
      font-family: var(--sans);
      font-size: 1.2em;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .field-input:focus { border-color: var(--accent); }

    /* ── CUSTOM SELECT ── */
    .cselect {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .cselect-trigger {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 0.3em;
      padding: 0.6em 0.9em;
      font-family: var(--sans);
      font-size: 1.2em;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5em;
      text-align: left;
      transition: border-color 0.15s;
    }

    .cselect-trigger:focus,
    .cselect.open .cselect-trigger { border-color: var(--accent); outline: none; }

    .cselect-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cselect-arrow {
      flex-shrink: 0;
      width: 0.9em;
      height: 0.9em;
      color: var(--text-3);
      transition: transform 0.15s;
    }

    .cselect.open .cselect-arrow { transform: rotate(180deg); }

    .cselect-panel {
      position: fixed; /* fixed so it escapes overflow:hidden on card/meter-block */
      background: var(--panel);
      border: 1px solid var(--accent-glow);
      border-radius: 0.3em;
      box-shadow: 0 0.8em 2em rgba(0, 0, 0, 0.55);
      z-index: 1000;
      max-height: 18em;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-bright) transparent;
    }

    .cselect-option {
      padding: 0.7em 0.9em;
      font-family: var(--sans);
      font-size: 1.2em;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      border-bottom: 1px solid var(--border);
    }

    .cselect-option:last-child { border-bottom: none; }
    .cselect-option:hover      { background: var(--accent-dim); color: var(--text); }
    .cselect-option.active     { color: var(--accent); background: var(--accent-dim); }

    /* ── CUSTOM STEPPER ── */
    .cstepper {
      flex: 1;
      display: flex;
      align-items: stretch;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 0.3em;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .cstepper:focus-within { border-color: var(--accent); }

    .cstepper-btn {
      background: var(--panel-2);
      border: none;
      color: var(--text-2);
      font-size: 1.3em;
      font-weight: 300;
      width: 2.4em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
      border-right: 1px solid var(--border-bright);
      user-select: none;
    }

    .cstepper-btn:last-child   { border-right: none; border-left: 1px solid var(--border-bright); }
    .cstepper-btn:hover:not(:disabled) { background: var(--border); color: var(--accent); }
    .cstepper-btn:disabled     { opacity: 0.3; cursor: not-allowed; }

    .cstepper-val {
      flex: 1;
      text-align: center;
      font-family: var(--mono);
      font-size: 1.2em;
      color: var(--text);
      padding: 0.6em 0.4em;
      background: transparent;
      border: none;
      outline: none;
      min-width: 0;
      cursor: text;
    }

    /* Select-all on focus so typing immediately replaces the old value */
    .cstepper-val:focus { color: var(--accent); }

    /* ── BLOCK FOOTER ── */
    .meter-block-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0.8em 1.4em;
      border-top: 1px solid var(--border);
      gap: 0.8em;
    }

    .save-status        { font-family: var(--mono); font-size: 1em; letter-spacing: 0.06em; color: var(--text-3); flex: 1; transition: color 0.2s; }
    .save-status.saved  { color: var(--green); }
    .save-status.error  { color: var(--red); }

    /* ── FOOTER NOTE ── */
    .footer-note {
      font-family: var(--mono);
      font-size: 1em;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }
  </style>
</head>

<body>

  <main class="card">

    <!-- ── HEADER ── -->
    <div class="card-header">
      <div class="header-badge">
        <a href="/">
          <img src="airmeter.webp" alt="AirMeter Logo" class="header-logo">
        </a>
        <span class="header-title">Meters</span>
      </div>

      <div class="header-right">
        <!-- Home button -->
        <a class="home-btn" href="/" title="Home">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12 L12 3 L21 12" />
            <path d="M5 10 L5 21 L19 21 L19 10" />
            <path d="M9 21 L9 15 L15 15 L15 21" />
          </svg>
        </a>
      </div>
    </div>

    <!-- ── ACTIVE METERS ── -->
    <div class="section-label" id="active-label">Active &amp; Configured Meters</div>

    <!-- Loading state -->
    <div id="loading-state" class="empty-state">
      <span class="spinner-inline" style="width:2.5em;height:2.5em;border-width:0.25em;margin:0 0 0.6em 0"></span>
      <div class="empty-title">Loading</div>
    </div>

    <!-- Empty state (no meters ever seen, none configured) -->
    <div id="empty-state" class="empty-state hidden">
      <svg viewBox="0 0 48 48" fill="none">
        <rect x="6" y="10" width="36" height="28" rx="3" stroke="currentColor" stroke-width="2"/>
        <path d="M14 26l6-6 5 5 7-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="36" cy="30" r="3" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <div class="empty-title">No meters found</div>
      <div class="empty-desc">No meters have been seen since boot and no configurations are stored. Turn on a meter and come back.</div>
    </div>

    <!-- Meter blocks injected here -->
    <div class="meter-blocks" id="meter-blocks"></div>

    <div class="divider"></div>

    <!-- ── FOOTER ── -->
    <div class="card-footer">
      <div class="footer-note">
        Settings are stored on the ESP32's flash memory and survive reboots.
        Changes take effect immediately — no restart required.
      </div>
    </div>

  </main>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <script>
    /* ── GLOBALS ── */
    const $ = id => document.getElementById(id);
    const FPS_OPTIONS = [1, 2, 3, 5, 10]; // index 0–4, matches transmitter

    let allSettings    = {}; // full settings blob from ESP32
    let activeMeterIds = new Set(); // meters seen since boot
    let availableImages = []; // .webp files from Storage

    /* ── TOAST ── */
    let toastTimer = null;
    function showToast(msg, type = 'success') {
      const t = $('toast');
      t.textContent = msg;
      t.className   = `toast ${type} visible`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('visible'), 2800);
    }

    /* ── IMAGE THUMBNAIL ── */
    function thumbHtml(image, name) {
      const initials = (name || '??').replace(/[^A-Z0-9]/gi, '').slice(0, 2).toUpperCase() || '??';
      if (image) {
        return `<img src="${image}" alt="${name}"
                    onload="this.classList.add('loaded')"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="meter-thumb-fallback" style="display:none">${initials}</span>`;
      }
      return `<span class="meter-thumb-fallback">${initials}</span>`;
    }

    /* ═══════════════════════════════════════════════════════════
       CUSTOM SELECT
       ─────────────────────────────────────────────────────────
       buildCselect(hiddenId, options, selectedValue, onchangeExpr)
         options: [{value, label}]
         onchangeExpr: string to eval on pick, e.g. "onImageChange(1)"
       ═══════════════════════════════════════════════════════════ */
    function buildCselect(hiddenId, options, selectedValue, onchangeExpr) {
      const sel = options.find(o => String(o.value) === String(selectedValue));
      const selectedLabel = sel ? sel.label : (options[0] ? options[0].label : '—');

      const optionRows = options.map(o => {
        const isActive = String(o.value) === String(selectedValue);
        return `<div class="cselect-option${isActive ? ' active' : ''}" data-value="${o.value}"
                     onclick="cselectPick(this,'${onchangeExpr}')">${o.label}</div>`;
      }).join('');

      return `<div class="cselect">
        <input type="hidden" id="${hiddenId}" value="${selectedValue}">
        <button class="cselect-trigger" type="button"
                onclick="cselectToggle(this.closest('.cselect'))">
          <span class="cselect-label">${selectedLabel}</span>
          <svg class="cselect-arrow" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="cselect-panel hidden">
          ${optionRows}
        </div>
      </div>`;
    }

    function cselectClose() {
      document.querySelectorAll('.cselect.open').forEach(s => {
        s.classList.remove('open');
        s.querySelector('.cselect-panel').classList.add('hidden');
      });
    }

    function cselectToggle(wrapper) {
      const panel   = wrapper.querySelector('.cselect-panel');
      const trigger = wrapper.querySelector('.cselect-trigger');
      const isOpen  = wrapper.classList.contains('open');

      cselectClose(); // close any other open select first

      if (!isOpen) {
        wrapper.classList.add('open');
        panel.classList.remove('hidden');

        // Position panel using fixed coords so it escapes overflow:hidden parents
        const rect       = trigger.getBoundingClientRect();
        panel.style.top  = `${rect.bottom + 4}px`;
        panel.style.left = `${rect.left}px`;
        panel.style.width = `${rect.width}px`;
      }
    }

    function cselectPick(option, onchangeExpr) {
      const wrapper = option.closest('.cselect');
      const panel   = wrapper.querySelector('.cselect-panel');
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      const label   = wrapper.querySelector('.cselect-label');

      wrapper.querySelectorAll('.cselect-option').forEach(o => o.classList.remove('active'));
      option.classList.add('active');
      hidden.value      = option.dataset.value;
      label.textContent = option.textContent;

      wrapper.classList.remove('open');
      panel.classList.add('hidden');

      if (onchangeExpr) eval(onchangeExpr);
    }

    // Close open selects when clicking outside or scrolling
    document.addEventListener('click',  e => { if (!e.target.closest('.cselect')) cselectClose(); }, true);
    document.addEventListener('scroll', () => cselectClose(), true);

    /* ═══════════════════════════════════════════════════════════
       CUSTOM STEPPER
       ─────────────────────────────────────────────────────────
       buildCstepper(hiddenId, value, min, max, onchangeExpr)
       ═══════════════════════════════════════════════════════════ */
    function buildCstepper(hiddenId, value, min, max, onchangeExpr) {
      const atMin = value <= min;
      const atMax = value >= max;
      return `<div class="cstepper" data-min="${min}" data-max="${max}">
        <input type="hidden" id="${hiddenId}" value="${value}">
        <button class="cstepper-btn" type="button"
                onclick="cstepperAdj(this,-1,'${onchangeExpr}')"
                ${atMin ? 'disabled' : ''}>−</button>
        <input class="cstepper-val" type="text" inputmode="numeric"
               value="${value}"
               onfocus="this.select()"
               onblur="cstepperInput(this,'${onchangeExpr}')"
               onkeydown="if(event.key==='Enter')this.blur();if(event.key==='ArrowUp'){event.preventDefault();cstepperAdj(this.closest('.cstepper').querySelectorAll('.cstepper-btn')[1],+1,'${onchangeExpr}')}if(event.key==='ArrowDown'){event.preventDefault();cstepperAdj(this.closest('.cstepper').querySelectorAll('.cstepper-btn')[0],-1,'${onchangeExpr}')}">
        <button class="cstepper-btn" type="button"
                onclick="cstepperAdj(this,+1,'${onchangeExpr}')"
                ${atMax ? 'disabled' : ''}>+</button>
      </div>`;
    }

    function cstepperSetVal(wrapper, val, onchangeExpr) {
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      const display = wrapper.querySelector('.cstepper-val');
      const min     = parseInt(wrapper.dataset.min, 10);
      const max     = parseInt(wrapper.dataset.max, 10);

      val = Math.max(min, Math.min(max, val));
      hidden.value  = val;
      display.value = val;

      const [btnMinus, btnPlus] = wrapper.querySelectorAll('.cstepper-btn');
      btnMinus.disabled = val <= min;
      btnPlus.disabled  = val >= max;

      if (onchangeExpr) eval(onchangeExpr);
    }

    function cstepperAdj(btn, delta, onchangeExpr) {
      const wrapper = btn.closest('.cstepper');
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      cstepperSetVal(wrapper, parseInt(hidden.value, 10) + delta, onchangeExpr);
    }

    function cstepperInput(input, onchangeExpr) {
      const wrapper = input.closest('.cstepper');
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      let val = parseInt(input.value, 10);
      if (isNaN(val)) val = parseInt(hidden.value, 10); // revert if not a number
      cstepperSetVal(wrapper, val, onchangeExpr);
    }

    /* ── RENDER ONE METER BLOCK ── */
    function renderMeterBlock(id, isActive, cfg) {
      const name   = cfg.name  || '';
      const image  = cfg.image || '';
      const fpsIdx = (cfg.fps !== undefined) ? cfg.fps : 2; // default index 2 = 3 Hz

      const displayName = name || 'UNKNOWN';
      const badgeClass  = isActive ? 'active'  : 'inactive';
      const badgeLabel  = isActive ? 'Active'  : 'Stored';

      // Build option lists for the custom selects
      const imageOpts = [
        { value: '', label: '— None —' },
        ...availableImages.map(f => ({ value: f, label: f }))
      ];
      const fpsOpts = FPS_OPTIONS.map((fps, idx) => ({ value: idx, label: `${fps} Hz` }));

      const block = document.createElement('div');
      block.className   = 'meter-block';
      block.dataset.mid = id;
      block.innerHTML = `
        <div class="meter-block-header">
          <div class="meter-thumb" id="thumb-${id}">
            ${thumbHtml(image, displayName)}
          </div>
          <div class="meter-block-title">
            <div class="meter-block-name" id="display-name-${id}">${displayName}</div>
            <div class="meter-block-sub">ID · ${id}</div>
          </div>
          <span class="meter-active-badge ${badgeClass}">
            <span class="dot"></span>${badgeLabel}
          </span>
          <button class="btn-icon danger" onclick="deleteMeter(${id})" title="Delete config">
            <svg viewBox="0 0 16 16" fill="none">
              <path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor"
                    stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="meter-fields">
          <div class="field-row">
            <span class="field-label">Name</span>
            <input type="text"
                   class="field-input"
                   id="name-${id}"
                   placeholder="UNKNOWN"
                   maxlength="32"
                   value="${name}"
                   oninput="onFieldChange(${id})">
          </div>
          <div class="field-row">
            <span class="field-label">Image</span>
            ${buildCselect(`image-${id}`, imageOpts, image, `onImageChange(${id})`)}
          </div>
          <div class="field-row">
            <span class="field-label">Meter ID</span>
            ${buildCstepper(`newid-${id}`, id, 0, 31, `onFieldChange(${id})`)}
          </div>
          <div class="field-row">
            <span class="field-label">Refresh</span>
            ${buildCselect(`fps-${id}`, fpsOpts, fpsIdx, `onFieldChange(${id})`)}
          </div>
        </div>
        <div class="meter-block-footer">
          <span class="save-status" id="status-${id}"></span>
          <button class="btn btn-md btn-accent" id="save-${id}" onclick="saveMeter(${id})" disabled>Save</button>
        </div>
      `;
      return block;
    }

    /* ── FIELD CHANGE: enable save ── */
    function onFieldChange(id) {
      $(`save-${id}`).disabled = false;
      $(`status-${id}`).className = 'save-status';
      $(`status-${id}`).textContent = '';
    }

    /* ── IMAGE CHANGE: also update thumbnail preview ── */
    function onImageChange(id) {
      onFieldChange(id);
      const img  = $(`image-${id}`).value;
      const name = $(`name-${id}`).value.trim();
      $(`thumb-${id}`).innerHTML = thumbHtml(img, name || 'UNKNOWN');
    }

    function rebuildBlock(oldId, newId) {
      const cfg    = allSettings.meters[newId] || {};
      const active = activeMeterIds.has(newId);

      const oldBlock = document.querySelector(`[data-mid="${oldId}"]`);
      const newBlock = renderMeterBlock(newId, active, cfg);
      oldBlock.replaceWith(newBlock);

      delete allSettings.meters[oldId];
      activeMeterIds.delete(oldId);

      saveMeter(newId);
    }

    /* ── SAVE ONE METER ── */
    async function saveMeter(id) {
      const btn      = $(`save-${id}`);
      const statusEl = $(`status-${id}`);
      const name     = $(`name-${id}`).value.trim();
      const image    = $(`image-${id}`).value;
      const newId    = parseInt($(`newid-${id}`).value, 10);
      const fpsIdx   = parseInt($(`fps-${id}`).value, 10);

      const fpsChanged = allSettings.meters[id] && allSettings.meters[id].fps !== fpsIdx;
      const idChanged  = newId !== id;

      if (idChanged || fpsChanged) {
        const r = await fetch('/api/meter/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oldId: id, newId: idChanged ? newId : id, fpsIdx })
        }).then(r => r.json());

        if (r.status !== 'success') {
          statusEl.className   = 'save-status error';
          statusEl.textContent = idChanged ? '✗ ID change failed' : '✗ Update failed';
          btn.disabled = false;
          return;
        }

        if (idChanged) {
          allSettings.meters[newId] = {
            ...(allSettings.meters[id] || {}),
            name,
            image,
            fps: fpsIdx
          };
          rebuildBlock(id, newId);
          return;
        }
      }

      btn.disabled         = true;
      statusEl.className   = 'save-status';
      statusEl.textContent = 'Saving…';

      if (!allSettings.meters)     allSettings.meters     = {};
      if (!allSettings.meters[id]) allSettings.meters[id] = {};

      allSettings.meters[id].name  = name;
      allSettings.meters[id].image = image;
      allSettings.meters[id].fps   = fpsIdx;

      fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(allSettings)
      })
      .then(r => r.json())
      .then(d => {
        if (d.status === 'success') {
          statusEl.className   = 'save-status saved';
          statusEl.textContent = '✓ Saved';
          const displayName = name || 'UNKNOWN';
          $(`display-name-${id}`).textContent = displayName;
          if (!image) {
            const initials = displayName.replace(/[^A-Z0-9]/gi,'').slice(0,2).toUpperCase() || '??';
            $(`thumb-${id}`).innerHTML = `<span class="meter-thumb-fallback">${initials}</span>`;
          }
          showToast(`Meter ${id} saved`, 'success');
        } else {
          throw new Error('Save returned non-success');
        }
      })
      .catch(() => {
        btn.disabled         = false;
        statusEl.className   = 'save-status error';
        statusEl.textContent = '✗ Save failed';
        showToast('Save failed — check connection', 'fail');
      });
    }

    function deleteMeter(id) {
      fetch('/api/meter/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      .then(r => r.json())
      .then(d => {
        if (d.status === 'success') {
          document.querySelector(`[data-mid="${id}"]`).remove();
          delete allSettings.meters[id];
          if ($('meter-blocks').children.length === 0) {
            $('empty-state').classList.remove('hidden');
          }
          showToast(`Meter ${id} deleted`, 'success');
        } else {
          showToast('Delete failed', 'fail');
        }
      })
      .catch(() => showToast('Delete failed — check connection', 'fail'));
    }

    /* ── INIT ── */
    async function init() {
      const [settingsRes, systemRes, filesRes] = await Promise.allSettled([
        fetch('/api/settings').then(r => r.json()),
        fetch('/api/system').then(r => r.json()),
        fetch('/api/files/meters').then(r => r.json())
      ]);

      allSettings = (settingsRes.status === 'fulfilled') ? settingsRes.value : {};
      if (!allSettings.meters) allSettings.meters = {};

      if (systemRes.status === 'fulfilled') {
        (systemRes.value.meters || []).forEach(m => activeMeterIds.add(m.id));
      }

      availableImages = (filesRes.status === 'fulfilled') ? filesRes.value : [];

      const storedIds = Object.keys(allSettings.meters).map(Number);
      const allIds    = [...new Set([...activeMeterIds, ...storedIds])].sort((a, b) => a - b);

      $('loading-state').classList.add('hidden');

      if (allIds.length === 0) {
        $('empty-state').classList.remove('hidden');
        return;
      }

      const container = $('meter-blocks');
      allIds.forEach(id => {
        const cfg    = allSettings.meters[id] || {};
        const active = activeMeterIds.has(id);
        container.appendChild(renderMeterBlock(id, active, cfg));
      });
    }

    init().catch(err => {
      console.error('Init failed:', err);
      $('loading-state').classList.add('hidden');
      $('empty-state').classList.remove('hidden');
    });
  </script>

</body>
</html>
