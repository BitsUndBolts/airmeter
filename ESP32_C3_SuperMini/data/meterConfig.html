<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirMeter · Meters</title>
  <link rel="stylesheet" href="airmeter.css">
  <style>
    .card-header { justify-content: space-between; }

    /* ── EMPTY STATE OVERRIDE (taller padding for this page) ── */
    .empty-state { padding: 3em 2em; }

    /* ── METER THUMB SIZE ── */
    .meter-thumb img                    { height: 4em; padding-left: 0; }
    .meter-block .meter-thumb           { width: 3.2em; height: 3.2em; }
    .meter-block .meter-thumb-fallback  { font-size: 3em; }

    /* ── SPINNER OVERRIDE (smaller on this page) ── */
    .spinner-inline {
      width: 1.2em;
      height: 1.2em;
      border-width: 0.18em;
      margin-right: 0.4em;
    }

    /* ── METER BLOCKS ── */
    .meter-blocks {
      padding: 0 1.2em 1.2em;
      display: flex;
      flex-direction: column;
      gap: 1.2em;
    }

    .meter-block {
      position: relative;
      background: var(--panel-2);
      border: 1px solid var(--border-bright);
      border-radius: 0.5em;
      overflow: hidden;
    }

    /* ── SAVE / VERIFY OVERLAY ── */
    .save-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      padding: 1.6em;
      text-align: center;
      background: rgba(10,11,13,0.92);
      backdrop-filter: blur(2px);
    }

    .save-overlay.hidden { display: none; }

    .save-overlay .spinner-inline {
      width: 2em;
      height: 2em;
      border-width: 0.2em;
      margin: 0 0 0.2em 0;
    }

    .save-overlay-title {
      font-family: var(--mono);
      font-size: 1.1em;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .save-overlay.failed .save-overlay-title { color: var(--red); }

    .save-overlay-sub {
      font-family: var(--mono);
      font-size: 0.9em;
      letter-spacing: 0.04em;
      color: var(--text-3);
      min-height: 1.2em;
    }

    .save-overlay-actions {
      display: flex;
      gap: 0.6em;
      margin-top: 0.4em;
    }

    .meter-block-header {
      display: flex;
      align-items: center;
      gap: 1.2em;
      padding: 1.2em 1.4em;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }

    .meter-block-title { flex: 1; min-width: 0; }
    .meter-block-name  { font-size: 1.3em; font-weight: 600; color: var(--text); }

    .meter-block-sub {
      font-family: var(--mono);
      font-size: 0.95em;
      color: var(--text-3);
      letter-spacing: 0.06em;
      margin-top: 0.2em;
    }

    .meter-active-badge {
      font-family: var(--mono);
      font-size: 0.85em;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.25em 0.7em;
      border-radius: 0.25em;
      flex-shrink: 0;
    }

    .meter-active-badge.active   { color: var(--green);  background: var(--green-dim); border: 1px solid rgba(61,220,132,0.2); }
    .meter-active-badge.inactive { color: var(--text-3); background: rgba(74,81,88,0.2); border: 1px solid var(--border); }

    .meter-active-badge .dot {
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── FIELDS ── */
    .meter-fields { padding: 1.2em 1.4em; display: flex; flex-direction: column; gap: 1em; }

    .field-row   { display: flex; align-items: center; gap: 1em; }

    .field-label {
      font-family: var(--mono);
      font-size: 1em;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      width: 5.5em;
      flex-shrink: 0;
    }

    .field-input {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 0.3em;
      padding: 0.6em 0.9em;
      font-family: var(--sans);
      font-size: 1.2em;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .field-input:focus { border-color: var(--accent); }

    /* ── CUSTOM SELECT ── */
    .cselect {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .cselect-trigger {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 0.3em;
      padding: 0.6em 0.9em;
      font-family: var(--sans);
      font-size: 1.2em;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5em;
      text-align: left;
      transition: border-color 0.15s;
    }

    .cselect-trigger:focus,
    .cselect.open .cselect-trigger { border-color: var(--accent); outline: none; }

    .cselect-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cselect-arrow {
      flex-shrink: 0;
      width: 0.9em;
      height: 0.9em;
      color: var(--text-3);
      transition: transform 0.15s;
    }

    .cselect.open .cselect-arrow { transform: rotate(180deg); }

    .cselect-panel {
      position: fixed; /* fixed so it escapes overflow:hidden on card/meter-block */
      background: var(--panel);
      border: 1px solid var(--accent-glow);
      border-radius: 0.3em;
      box-shadow: 0 0.8em 2em rgba(0, 0, 0, 0.55);
      z-index: 1000;
      max-height: 18em;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-bright) transparent;
    }

    .cselect-option {
      padding: 0.7em 0.9em;
      font-family: var(--sans);
      font-size: 1.2em;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      border-bottom: 1px solid var(--border);
    }

    .cselect-option:last-child { border-bottom: none; }
    .cselect-option:hover      { background: var(--accent-dim); color: var(--text); }
    .cselect-option.active     { color: var(--accent); background: var(--accent-dim); }

    /* ── CUSTOM STEPPER ── */
    .cstepper {
      flex: 1;
      display: flex;
      align-items: stretch;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 0.3em;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .cstepper:focus-within { border-color: var(--accent); }

    .cstepper-btn {
      background: var(--panel-2);
      border: none;
      color: var(--text-2);
      font-size: 1.3em;
      font-weight: 300;
      width: 2.4em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
      border-right: 1px solid var(--border-bright);
      user-select: none;
    }

    .cstepper-btn:last-child   { border-right: none; border-left: 1px solid var(--border-bright); }
    .cstepper-btn:hover:not(:disabled) { background: var(--border); color: var(--accent); }
    .cstepper-btn:disabled     { opacity: 0.3; cursor: not-allowed; }

    .cstepper-val {
      flex: 1;
      text-align: center;
      font-family: var(--mono);
      font-size: 1.2em;
      color: var(--text);
      padding: 0.6em 0.4em;
      background: transparent;
      border: none;
      outline: none;
      min-width: 0;
      cursor: text;
    }

    /* Select-all on focus so typing immediately replaces the old value */
    .cstepper-val:focus { color: var(--accent); }

    /* ── BLOCK FOOTER ── */
    .meter-block-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0.8em 1.4em;
      border-top: 1px solid var(--border);
      gap: 0.8em;
    }

    .save-status        { font-family: var(--mono); font-size: 1em; letter-spacing: 0.06em; color: var(--text-3); flex: 1; transition: color 0.2s; }
    .save-status.saved  { color: var(--green); }
    .save-status.error  { color: var(--red); }

    /* ── TOGGLE CHECKBOX ── */
    .ctoggle {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.8em;
    }

    .ctoggle-track {
      position: relative;
      width: 2.8em;
      height: 1.6em;
      flex-shrink: 0;
      cursor: pointer;
    }

    .ctoggle-track input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .ctoggle-rail {
      position: absolute;
      inset: 0;
      border-radius: 1em;
      background: var(--panel-2);
      border: 1px solid var(--border-bright);
      transition: background 0.2s, border-color 0.2s;
    }

    .ctoggle-track input:checked ~ .ctoggle-rail {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .ctoggle-knob {
      position: absolute;
      top: 0.2em;
      left: 0.2em;
      width: 1.1em;
      height: 1.1em;
      border-radius: 50%;
      background: var(--text-3);
      transition: transform 0.2s, background 0.2s;
    }

    .ctoggle-track input:checked ~ .ctoggle-rail .ctoggle-knob {
      transform: translateX(1.2em);
      background: var(--accent);
    }

    .ctoggle-desc {
      font-family: var(--mono);
      font-size: 0.95em;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    /* ── FOOTER NOTE ── */
    .footer-note {
      font-family: var(--mono);
      font-size: 1em;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }
  </style>
</head>

<body>

  <main class="card">

    <!-- ── HEADER ── -->
    <div class="card-header">
      <div class="header-badge">
        <a href="/">
          <img src="airmeter.webp" alt="AirMeter Logo" class="header-logo">
        </a>
        <span class="header-title">Meters</span>
      </div>

      <div class="header-right">
        <!-- Home button -->
        <a class="home-btn" href="/" title="Home">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12 L12 3 L21 12" />
            <path d="M5 10 L5 21 L19 21 L19 10" />
            <path d="M9 21 L9 15 L15 15 L15 21" />
          </svg>
        </a>
      </div>
    </div>

    <!-- ── ACTIVE METERS ── -->
    <div class="section-label" id="active-label">Active &amp; Configured Meters</div>

    <!-- Loading state -->
    <div id="loading-state" class="empty-state">
      <span class="spinner-inline" style="width:2.5em;height:2.5em;border-width:0.25em;margin:0 0 0.6em 0"></span>
      <div class="empty-title">Loading</div>
    </div>

    <!-- Empty state (no meters ever seen, none configured) -->
    <div id="empty-state" class="empty-state hidden">
      <svg viewBox="0 0 48 48" fill="none">
        <rect x="6" y="10" width="36" height="28" rx="3" stroke="currentColor" stroke-width="2"/>
        <path d="M14 26l6-6 5 5 7-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="36" cy="30" r="3" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <div class="empty-title">No meters found</div>
      <div class="empty-desc">No meters have been seen since boot and no configurations are stored. Turn on a meter and come back.</div>
    </div>

    <!-- Meter blocks injected here -->
    <div class="meter-blocks" id="meter-blocks"></div>

    <div class="divider"></div>

    <!-- ── FOOTER ── -->
    <div class="card-footer">
      <div class="footer-note">
        Settings are stored on the ESP32's flash memory and survive reboots.
        Changes take effect immediately — no restart required.
      </div>
    </div>

  </main>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <script>
    /* ── GLOBALS ── */
    const $ = id => document.getElementById(id);
    const FPS_OPTIONS = [1, 2, 3, 5, 10]; // index 0–4, matches transmitter

    // Mid-air collision handling: how many times we resend an RF command
    // before giving up, and the safety multiplier/buffer applied on top of
    // the OLD transmit interval before we trust a fresh /api/system read.
    const MAX_RF_RETRIES   = 3;
    const VERIFY_MULTIPLIER = 2;     // double the old interval (per meter's own logic)
    const VERIFY_BUFFER_MS  = 150;   // extra slack for HC-12/serial latency

    let allSettings    = {}; // full settings blob from ESP32
    let activeMeters = new Map(); // meters seen since boot
    let availableImages = []; // .webp files from Storage

    /* ── TOAST ── */
    let toastTimer = null;
    function showToast(msg, type = 'success') {
      const t = $('toast');
      t.textContent = msg;
      t.className   = `toast ${type} visible`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('visible'), 2800);
    }

    /* ── IMAGE THUMBNAIL ── */
    function thumbHtml(image, name) {
      const initials = (name || '??').replace(/[^A-Z0-9]/gi, '').slice(0, 2).toUpperCase() || '??';
      if (image) {
        return `<img src="${image}" alt="${name}"
                    onload="this.classList.add('loaded')"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="meter-thumb-fallback" style="display:none">${initials}</span>`;
      }
      return `<span class="meter-thumb-fallback">${initials}</span>`;
    }

    /* ═══════════════════════════════════════════════════════════
       CUSTOM SELECT
       ─────────────────────────────────────────────────────────
       buildCselect(hiddenId, options, selectedValue, onChange)
         options:  [{value, label}]
         onChange: function called after a pick, receives no args
                   (read hidden input value inside the handler)
       ═══════════════════════════════════════════════════════════ */
    function buildCselect(hiddenId, options, selectedValue, onChange) {
      const sel = options.find(o => String(o.value) === String(selectedValue));
      const selectedLabel = sel ? sel.label : (options[0] ? options[0].label : '—');

      const optionRows = options.map(o => {
        const isActive = String(o.value) === String(selectedValue);
        return `<div class="cselect-option${isActive ? ' active' : ''}" data-value="${o.value}">${o.label}</div>`;
      }).join('');

      return `<div class="cselect">
        <input type="hidden" id="${hiddenId}" value="${selectedValue}">
        <button class="cselect-trigger" type="button"
                onclick="cselectToggle(this.closest('.cselect'))">
          <span class="cselect-label">${selectedLabel}</span>
          <svg class="cselect-arrow" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="cselect-panel hidden">
          ${optionRows}
        </div>
      </div>`;
    }

    function cselectClose() {
      document.querySelectorAll('.cselect.open').forEach(s => {
        s.classList.remove('open');
        s.querySelector('.cselect-panel').classList.add('hidden');
      });
    }

    function cselectToggle(wrapper) {
      const panel   = wrapper.querySelector('.cselect-panel');
      const trigger = wrapper.querySelector('.cselect-trigger');
      const isOpen  = wrapper.classList.contains('open');

      cselectClose(); // close any other open select first

      if (!isOpen) {
        wrapper.classList.add('open');
        panel.classList.remove('hidden');

        // Position panel using fixed coords so it escapes overflow:hidden parents
        const rect       = trigger.getBoundingClientRect();
        panel.style.top  = `${rect.bottom + 4}px`;
        panel.style.left = `${rect.left}px`;
        panel.style.width = `${rect.width}px`;
      }
    }

    // Called via delegated click listener — looks up the registered onChange
    // callback by the hidden input's id and invokes it.
    function cselectPick(option) {
      const wrapper = option.closest('.cselect');
      const panel   = wrapper.querySelector('.cselect-panel');
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      const label   = wrapper.querySelector('.cselect-label');

      wrapper.querySelectorAll('.cselect-option').forEach(o => o.classList.remove('active'));
      option.classList.add('active');
      hidden.value      = option.dataset.value;
      label.textContent = option.textContent;

      wrapper.classList.remove('open');
      panel.classList.add('hidden');

      const cb = cselectCallbacks.get(hidden.id);
      if (cb) cb();
    }

    // Delegated click handler for all cselect options — avoids inline onclick
    // on every option row and eliminates the need for eval().
    document.addEventListener('click', e => {
      const option = e.target.closest('.cselect-option');
      if (option) { cselectPick(option); return; }
      if (!e.target.closest('.cselect')) cselectClose();
    }, true);
    document.addEventListener('scroll', () => cselectClose(), true);

    // Registry mapping hidden-input id → onChange callback function.
    const cselectCallbacks = new Map();

    // Register a callback for a cselect after its HTML has been inserted.
    function cselectBind(hiddenId, onChange) {
      cselectCallbacks.set(hiddenId, onChange);
    }

    /* ═══════════════════════════════════════════════════════════
       CUSTOM STEPPER
       ─────────────────────────────────────────────────────────
       buildCstepper(hiddenId, value, min, max, onChange)
         onChange: function called after value changes
       ═══════════════════════════════════════════════════════════ */
    // Registry mapping hidden-input id → onChange callback function.
    const cstepperCallbacks = new Map();

    function buildCstepper(hiddenId, value, min, max, onChange) {
      cstepperCallbacks.set(hiddenId, onChange);
      const atMin = value <= min;
      const atMax = value >= max;
      return `<div class="cstepper" data-min="${min}" data-max="${max}" data-hid="${hiddenId}">
        <input type="hidden" id="${hiddenId}" value="${value}">
        <button class="cstepper-btn" type="button"
                onclick="cstepperAdj(this,-1)"
                ${atMin ? 'disabled' : ''}>−</button>
        <input class="cstepper-val" type="text" inputmode="numeric"
               value="${value}"
               onfocus="this.select()"
               onblur="cstepperInput(this)"
               onkeydown="if(event.key==='Enter')this.blur();if(event.key==='ArrowUp'){event.preventDefault();cstepperAdj(this.closest('.cstepper').querySelectorAll('.cstepper-btn')[1],+1)}if(event.key==='ArrowDown'){event.preventDefault();cstepperAdj(this.closest('.cstepper').querySelectorAll('.cstepper-btn')[0],-1)}">
        <button class="cstepper-btn" type="button"
                onclick="cstepperAdj(this,+1)"
                ${atMax ? 'disabled' : ''}>+</button>
      </div>`;
    }

    function cstepperSetVal(wrapper, val) {
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      const display = wrapper.querySelector('.cstepper-val');
      const min     = parseInt(wrapper.dataset.min, 10);
      const max     = parseInt(wrapper.dataset.max, 10);

      val = Math.max(min, Math.min(max, val));
      hidden.value  = val;
      display.value = val;

      const [btnMinus, btnPlus] = wrapper.querySelectorAll('.cstepper-btn');
      btnMinus.disabled = val <= min;
      btnPlus.disabled  = val >= max;

      const cb = cstepperCallbacks.get(wrapper.dataset.hid);
      if (cb) cb();
    }

    function cstepperAdj(btn, delta) {
      const wrapper = btn.closest('.cstepper');
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      cstepperSetVal(wrapper, parseInt(hidden.value, 10) + delta);
    }

    function cstepperInput(input) {
      const wrapper = input.closest('.cstepper');
      const hidden  = wrapper.querySelector('input[type="hidden"]');
      let val = parseInt(input.value, 10);
      if (isNaN(val)) val = parseInt(hidden.value, 10); // revert if not a number
      cstepperSetVal(wrapper, val);
    }

    /* ═══════════════════════════════════════════════════════════
       CUSTOM TOGGLE
       ─────────────────────────────────────────────────────────
       buildCtoggle(hiddenId, checked, onChange)
         onChange: function called after state changes
       ═══════════════════════════════════════════════════════════ */
    // Registry mapping hidden-input id → onChange callback function.
    const ctoggleCallbacks = new Map();

    function buildCtoggle(hiddenId, checked, onChange) {
      ctoggleCallbacks.set(hiddenId, onChange);
      return `<div class="ctoggle">
        <input type="hidden" id="${hiddenId}" value="${checked ? 1 : 0}">
        <label class="ctoggle-track">
          <input type="checkbox" ${checked ? 'checked' : ''}
                 data-hid="${hiddenId}"
                 onchange="ctoggleChange(this)">
          <span class="ctoggle-rail"><span class="ctoggle-knob"></span></span>
        </label>
        <span class="ctoggle-desc">Suppress duplicate transmissions when display is unchanged</span>
      </div>`;
    }

    function ctoggleChange(checkbox) {
      const hidden = checkbox.closest('.ctoggle').querySelector('input[type="hidden"]');
      hidden.value = checkbox.checked ? 1 : 0;
      const cb = ctoggleCallbacks.get(checkbox.dataset.hid);
      if (cb) cb();
    }

    /* ── RENDER ONE METER BLOCK ── */
    function renderMeterBlock(channel, cfg) {
      const name   = cfg.name  || '';
      const image  = cfg.image || '';
      const meterData = activeMeters.get(channel);
      const fpsIdx    = meterData?.fpsIdx    ?? 2; // default index 2 = 3 Hz
      const powerSave = meterData?.powerSave ?? 0; // default: off
      const isActive = (meterData !== undefined && meterData.seen < 5);

      const displayName = name || 'UNKNOWN';
      const badgeClass  = isActive ? 'active'  : 'inactive';
      const badgeLabel  = isActive ? 'Active'  : 'Inactive';

      // Build option lists for the custom selects
      const imageOpts = [
        { value: '', label: '— None —' },
        ...availableImages.map(f => ({ value: f, label: f }))
      ];
      const fpsOpts = FPS_OPTIONS.map((fps, idx) => ({ value: idx, label: `${fps} Hz` }));

      const block = document.createElement('div');
      block.className   = 'meter-block';
      block.dataset.channel = channel;
      block.innerHTML = `
        <div class="meter-block-header">
          <div class="meter-thumb" id="thumb-${channel}">
            ${thumbHtml(image, displayName)}
          </div>
          <div class="meter-block-title">
            <div class="meter-block-name" id="display-name-${channel}">${displayName}</div>
            <div class="meter-block-sub">Channel · ${channel}</div>
          </div>
          <span class="meter-active-badge ${badgeClass}">
            <span class="dot"></span>${badgeLabel}
          </span>
          <button class="btn-icon danger" onclick="deleteMeter(${channel})" title="Delete config">
            <svg viewBox="0 0 16 16" fill="none">
              <path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor"
                    stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="meter-fields">
          <div class="field-row">
            <span class="field-label">Name</span>
            <input type="text"
                   class="field-input"
                   id="name-${channel}"
                   placeholder="UNKNOWN"
                   maxlength="32"
                   value="${name}"
                   oninput="onFieldChange(${channel})">
          </div>
          <div class="field-row">
            <span class="field-label">Image</span>
            ${buildCselect(`image-${channel}`, imageOpts, image, null)}
          </div>
          <div class="field-row">
            <span class="field-label">Channel</span>
            ${buildCstepper(`newChannel-${channel}`, channel, 0, 31, () => onFieldChange(channel))}
          </div>
          <div class="field-row">
            <span class="field-label">Refresh</span>
            ${buildCselect(`fps-${channel}`, fpsOpts, fpsIdx, null)}
          </div>
          <div class="field-row">
            <span class="field-label">Power Save</span>
            ${buildCtoggle(`powerSave-${channel}`, !!powerSave, () => onFieldChange(channel))}
          </div>
        </div>
        <div class="meter-block-footer">
          <span class="save-status" id="status-${channel}"></span>
          <button class="btn btn-md btn-accent" id="save-${channel}" onclick="saveMeter(${channel})" disabled>Save</button>
        </div>
        <div class="save-overlay hidden" id="overlay-${channel}"></div>
      `;

      // Register cselect callbacks after innerHTML is set (callbacks reference closures,
      // not eval strings, so they must be bound after the hidden inputs exist in the DOM).
      cselectBind(`image-${channel}`, () => onImageChange(channel));
      cselectBind(`fps-${channel}`,   () => onFieldChange(channel));

      return block;
    }

    /* ── FIELD CHANGE: enable save ── */
    function onFieldChange(channel) {
      $(`save-${channel}`).disabled = false;
      $(`status-${channel}`).className = 'save-status';
      $(`status-${channel}`).textContent = '';
    }

    /* ── IMAGE CHANGE: also update thumbnail preview ── */
    function onImageChange(channel) {
      onFieldChange(channel);
      const img  = $(`image-${channel}`).value;
      const name = $(`name-${channel}`).value.trim();
      $(`thumb-${channel}`).innerHTML = thumbHtml(img, name || 'UNKNOWN');
    }

    function rebuildBlock(oldChannel, newChannel) {
      const cfg      = allSettings.meters[newChannel] || {};
      const oldBlock = document.querySelector(`[data-channel="${oldChannel}"]`);
      const newBlock = renderMeterBlock(newChannel, cfg);
      oldBlock.replaceWith(newBlock);
      // allSettings and activeMeters are already updated by saveMeter
      // before rebuildBlock is called. No saveMeter() call here.
    }

    /* ═══════════════════════════════════════════════════════════
       MID-AIR COLLISION HANDLING
       ─────────────────────────────────────────────────────────
       An RF update can be silently lost if it collides with a
       telemetry packet from any meter on the link. After sending
       a channel/fps/power-save change we read back /api/system
       and confirm the meter itself reports the new values before
       calling the change applied. If it doesn't match, we resend.
       ═══════════════════════════════════════════════════════════ */

    const sleep = ms => new Promise(res => setTimeout(res, ms));

    // How long to wait after sending an RF command before a fresh
    // telemetry packet reflecting it is guaranteed to have arrived.
    // Based on the NEW fps (the rate the meter is transmitting at
    // until it actually receives & applies the new command).
    function verifyWaitMs(newFpsIdx) {
      const hz = FPS_OPTIONS[newFpsIdx] ?? FPS_OPTIONS[2];
      const intervalMs = 1000 / hz;
      return Math.round(intervalMs * VERIFY_MULTIPLIER) + VERIFY_BUFFER_MS;
    }

    // Look up a single channel's entry from the live /api/system feed.
    async function fetchSystemMeter(channel) {
      const data = await fetch('/api/system').then(r => r.json());
      return (data.meters || []).find(m => m.channel === channel) || null;
    }

    function saveOverlayEl(channel) { return $(`overlay-${channel}`); }

    function showSaveOverlay(channel, title, sub) {
      const ov = saveOverlayEl(channel);
      ov.classList.remove('hidden', 'failed');
      ov.innerHTML = `
        <span class="spinner-inline"></span>
        <div class="save-overlay-title">${title}</div>
        <div class="save-overlay-sub">${sub || ''}</div>
      `;
    }

    function updateSaveOverlay(channel, title, sub) {
      const ov = saveOverlayEl(channel);
      const titleEl = ov.querySelector('.save-overlay-title');
      const subEl   = ov.querySelector('.save-overlay-sub');
      if (titleEl) titleEl.textContent = title;
      if (subEl)   subEl.textContent   = sub || '';
    }

    function hideSaveOverlay(channel) {
      saveOverlayEl(channel).classList.add('hidden');
    }

    function showSaveFailedOverlay(channel) {
      const ov = saveOverlayEl(channel);
      ov.classList.add('failed');
      ov.innerHTML = `
        <div class="save-overlay-title">⚠ Update failed</div>
        <div class="save-overlay-sub">The meter never confirmed the new settings after ${MAX_RF_RETRIES} attempts.</div>
        <div class="save-overlay-actions">
          <button class="btn btn-md btn-accent" onclick="retrySaveMeter(${channel})">Try again</button>
          <button class="btn btn-md" onclick="cancelSaveOverlay(${channel})">Cancel</button>
        </div>
      `;
    }

    function cancelSaveOverlay(channel) {
      hideSaveOverlay(channel);
      $(`save-${channel}`).disabled = false;
      $(`status-${channel}`).className   = 'save-status error';
      $(`status-${channel}`).textContent = '✗ Not applied';
    }

    function retrySaveMeter(channel) {
      saveMeter(channel);
    }

    // Sends the RF command and verifies it actually applied, resending
    // up to MAX_RF_RETRIES times. Returns true once /api/system confirms
    // the target channel reports the requested fpsIdx/powerSave.
    // Passes "commit":true so the ESP32 migrates its state atomically on
    // the same call — safe because delivery is confirmed before this runs.
    async function pushMeterUpdate(channel, { newChannel, fpsIdx, powerSave, flagsByte }) {
      const waitMs = verifyWaitMs(fpsIdx);
      showSaveOverlay(channel, 'Saving…', `Attempt 1 of ${MAX_RF_RETRIES}`);

      for (let attempt = 1; attempt <= MAX_RF_RETRIES; attempt++) {
        updateSaveOverlay(channel, 'Sending update…', `Attempt ${attempt} of ${MAX_RF_RETRIES}`);

        let sendOk = false;
        try {
          const r = await fetch('/api/meter/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // commit:false on every attempt — the ESP32 only sends the RF packet
            // and does NOT rename the settings key or migrate the registry yet.
            // The actual commit happens via /api/meter/commit below, but only
            // after we confirm the RP2040 echoed the new values. This way a
            // failed or colliding RF attempt can never leave the ESP32 in a
            // partially-committed state.
            body: JSON.stringify({ oldChannel: channel, newChannel, fpsIdx, flags: flagsByte, commit: false })
          }).then(r => r.json());
          sendOk = r.status === 'success';
        } catch (e) {
          sendOk = false;
        }

        if (sendOk) {
          updateSaveOverlay(channel, 'Verifying…', `Waiting ${(waitMs / 1000).toFixed(1)}s for confirmation…`);
          await sleep(waitMs);

          let confirmed = null;
          try {
            confirmed = await fetchSystemMeter(newChannel);
          } catch (e) {
            confirmed = null;
          }

          if (confirmed && confirmed.fpsIdx === fpsIdx && confirmed.powerSave === powerSave) {
            // RF delivery confirmed. Now commit the ESP32-side rename in one
            // dedicated call — this is the clean single commit point for the
            // online path, triggered only after we have proof of delivery.
            try {
              await fetch('/api/meter/commit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oldChannel: channel, newChannel })
              });
            } catch (e) { /* non-fatal — ESP32 state is consistent, retry on next load */ }
            activeMeters.set(newChannel, confirmed);
            if (newChannel !== channel) activeMeters.delete(channel);
            hideSaveOverlay(channel);
            return true;
          }
        }

        if (attempt < MAX_RF_RETRIES) {
          updateSaveOverlay(channel, sendOk ? 'Not applied yet…' : 'Send failed…', 'Retrying…');
        }
      }

      showSaveFailedOverlay(channel);
      return false;
    }

    /* ── SAVE ONE METER ── */
    async function saveMeter(channel) {
      const btn      = $(`save-${channel}`);
      const statusEl = $(`status-${channel}`);
      const name     = $(`name-${channel}`).value.trim();
      const image    = $(`image-${channel}`).value;
      const newChannel = parseInt($(`newChannel-${channel}`).value, 10);
      const fpsIdx     = parseInt($(`fps-${channel}`).value, 10);
      const powerSave  = parseInt($(`powerSave-${channel}`).value, 10); // 0 or 1
      const flagsByte  = powerSave & 0x01; // bit 0 = power conservation; bits 7-1 reserved

      const prevData  = activeMeters.get(channel);
      const oldPowerSave = prevData?.powerSave ?? 0;

      const channelChanged = newChannel !== channel;
      const fpsChanged     = (prevData?.fpsIdx ?? -1) !== fpsIdx;
      const flagsChanged   = (prevData?.powerSave ?? 0) !== powerSave;
      const rfChanged      = channelChanged || fpsChanged || flagsChanged;

      // canVerify: true when we expect to be able to confirm RF delivery by
      // polling /api/system for the new fpsIdx/powerSave echo from the meter.
      //
      // The `seen < 5` check is the normal "actively transmitting" gate.
      //
      // `oldPowerSave === 1` is included by design: a power-conservation meter
      // suppresses retransmission when the display is stable, so it may have
      // been silent for many minutes (reading OL, a fixed voltage, etc.) even
      // though it is on and will respond to an RF command. We can still verify
      // in that case — we send the command and wait; the RP2040 will force one
      // unconditional packet immediately after applying new settings (via the
      // settingsChanged flag), so confirmation will arrive within one TX window
      // even if the display hasn't changed. `seen` is intentionally NOT checked
      // here for this path; the meter being quiet is the whole point of power-save.
      const canVerify = (!!prevData && prevData.seen < 5) || oldPowerSave === 1;

      btn.disabled          = true;
      statusEl.className    = 'save-status';
      statusEl.textContent  = '';

      if (rfChanged) {
        if (canVerify) {
          const ok = await pushMeterUpdate(channel, {
            newChannel: channelChanged ? newChannel : channel,
            fpsIdx,
            powerSave,
            flagsByte
          });

          if (!ok) {
            // Overlay is showing the failure UI with Retry/Cancel — leave
            // the button state to cancelSaveOverlay()/retrySaveMeter().
            return;
          }
        } else {
          // Meter is offline — there's no telemetry to verify against.
          // Send the RF command with commit:false so the ESP32 does NOT
          // rename the settings key or migrate the registry yet. The old
          // channel entry stays intact on flash so that when the meter
          // powers back on and starts transmitting on oldChannel, the ESP32
          // still recognises it. The UI will detect the channel mismatch
          // via /api/system and call /api/meter/commit to finalize the rename
          // only once the RP2040 confirms it applied the new config.
          let sendOk = false;
          try {
            const r = await fetch('/api/meter/update', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                oldChannel: channel,
                newChannel: channelChanged ? newChannel : channel,
                fpsIdx,
                flags: flagsByte,
                commit: false   // ← do NOT rename on ESP32 yet
              })
            }).then(r => r.json());
            sendOk = r.status === 'success';
          } catch (e) {
            sendOk = false;
          }

          if (!sendOk) {
            statusEl.className   = 'save-status error';
            statusEl.textContent = channelChanged ? '✗ Channel change failed' : '✗ Update failed';
            btn.disabled = false;
            return;
          }

          showToast(`Command queued — meter ${channelChanged ? `${channel}→${newChannel}` : channel} is offline, will apply once it reconnects`, 'success');
        }

        if (channelChanged) {
          // Online path: /api/meter/commit was already called inside
          // pushMeterUpdate after RF delivery was confirmed, so ESP32 flash
          // and registry are already renamed. Mirror into local JS state.
          //
          // Offline path: ESP32 flash is intentionally NOT renamed yet
          // (commit:false). We still mirror into local JS so the UI block
          // shows the intended new channel. When the meter wakes up the
          // mismatch between the JS state and /api/system will be used to
          // trigger /api/meter/commit automatically (future enhancement) or
          // the user can reload the page to see the current state.
          allSettings.meters[newChannel] = {
            ...(allSettings.meters[channel] || {}),
            name,
            image
          };
          const carried = activeMeters.get(channel) || {};
          activeMeters.set(newChannel, { ...carried, fpsIdx, powerSave });
          activeMeters.delete(channel);
          delete allSettings.meters[channel];
          rebuildBlock(channel, newChannel);
          return;
        }
      }

      statusEl.className   = 'save-status';
      statusEl.textContent = 'Saving…';
      if (!allSettings.meters[channel]) allSettings.meters[channel] = {};

      allSettings.meters[channel].name  = name;
      allSettings.meters[channel].image = image;

      fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(allSettings)
      })
      .then(r => r.json())
      .then(d => {
        if (d.status === 'success') {
          statusEl.className   = 'save-status saved';
          statusEl.textContent = '✓ Saved';
          const displayName = name || 'UNKNOWN';
          $(`display-name-${channel}`).textContent = displayName;
          if (!image) {
            const initials = displayName.replace(/[^A-Z0-9]/gi,'').slice(0,2).toUpperCase() || '??';
            $(`thumb-${channel}`).innerHTML = `<span class="meter-thumb-fallback">${initials}</span>`;
          }
          showToast(`Channel ${channel} saved`, 'success');
        } else {
          throw new Error('Save returned non-success');
        }
      })
      .catch(() => {
        btn.disabled         = false;
        statusEl.className   = 'save-status error';
        statusEl.textContent = '✗ Save failed';
        showToast('Save failed — check connection', 'fail');
      });
    }

    function deleteMeter(channel) {
      fetch('/api/meter/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channel })
      })
      .then(r => r.json())
      .then(d => {
        if (d.status === 'success') {
          document.querySelector(`[data-channel="${channel}"]`).remove();
          delete allSettings.meters[channel];
          if ($('meter-blocks').children.length === 0) {
            $('empty-state').classList.remove('hidden');
          }
          showToast(`Channel ${channel} deleted`, 'success');
        } else {
          showToast('Delete failed', 'fail');
        }
      })
      .catch(() => showToast('Delete failed — check connection', 'fail'));
    }

    /* ── INIT ── */
    async function init() {
      const [settingsRes, systemRes, filesRes] = await Promise.allSettled([
        fetch('/api/settings').then(r => r.json()),
        fetch('/api/system').then(r => r.json()),
        fetch('/api/files/meters').then(r => r.json())
      ]);

      allSettings = (settingsRes.status === 'fulfilled') ? settingsRes.value : {};
      if (!allSettings.meters) allSettings.meters = {};

      if (systemRes.status === 'fulfilled') {
        (systemRes.value.meters || []).forEach(m => {
          const { channel, ...data } = m; 
          activeMeters.set(channel, data);
        });
      }

      availableImages = (filesRes.status === 'fulfilled') ? filesRes.value : [];

      const storedChannels = Object.keys(allSettings.meters).map(Number);
      const allChannels = [...new Set([...activeMeters.keys(), ...storedChannels])].sort((a, b) => a - b);

      $('loading-state').classList.add('hidden');

      if (allChannels.length === 0) {
        $('empty-state').classList.remove('hidden');
        return;
      }

      const container = $('meter-blocks');
      allChannels.forEach(channel => {
        const cfg    = allSettings.meters[channel] || {};
        container.appendChild(renderMeterBlock(channel, cfg));
      });
    }

    init().catch(err => {
      console.error('Init failed:', err);
      $('loading-state').classList.add('hidden');
      $('empty-state').classList.remove('hidden');
    });
  </script>

</body>
</html>
